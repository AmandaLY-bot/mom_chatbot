<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>💕 妈妈的贴心小棉袄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fdf6ed;
            background-image: radial-gradient(circle at 20% 30%, #fce9db 0%, #fdf6ed 80%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 520px;
            height: 92vh;
            max-height: 780px;
            background: rgba(255, 248, 240, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            box-shadow: 0 20px 60px rgba(180, 120, 100, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 220, 200, 0.5);
        }

        /* ===== 顶部 ===== */
        .header {
            padding: 22px 24px 14px 24px;
            text-align: center;
            background: linear-gradient(135deg, #fce4d6 0%, #fdeee8 100%);
            border-bottom: 1px solid #f5d9cc;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            color: #7a4a3a;
            letter-spacing: 2px;
        }

        .header .sub {
            font-size: 16px;
            color: #b07a6a;
            margin-top: 4px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .header .date {
            font-size: 14px;
            color: #c49585;
            margin-top: 2px;
        }

        /* ===== 聊天区域 ===== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 18px 20px 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* 滚动条美化 */
        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #e2c8bc;
            border-radius: 4px;
        }

        /* ===== 消息气泡 ===== */
        .message {
            max-width: 88%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 20px;
            line-height: 1.7;
            word-break: break-word;
            animation: fadeIn 0.4s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #e8d5cb;
            color: #4d332a;
            border-bottom-right-radius: 6px;
        }

        .message.bot {
            align-self: flex-start;
            background: #ffffff;
            color: #3d2c24;
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 12px rgba(160, 120, 100, 0.10);
        }

        .message.bot .praise-tag {
            display: inline-block;
            background: #f7d9c8;
            color: #8a4e3a;
            font-size: 14px;
            padding: 2px 14px;
            border-radius: 20px;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .message.bot .praise-tag::before {
            content: "🌹 ";
        }

        /* ===== 输入区域 ===== */
        .input-area {
            padding: 14px 20px 20px 20px;
            background: rgba(255, 248, 240, 0.6);
            border-top: 1px solid #f0dad0;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            border: none;
            border-radius: 24px;
            padding: 14px 20px;
            font-size: 20px;
            font-family: inherit;
            background: #ffffff;
            resize: none;
            outline: none;
            box-shadow: 0 2px 12px rgba(160, 120, 100, 0.08);
            transition: box-shadow 0.2s;
            min-height: 52px;
            max-height: 120px;
            line-height: 1.5;
            color: #3d2c24;
        }

        .input-area textarea:focus {
            box-shadow: 0 2px 20px rgba(180, 130, 110, 0.15);
        }

        .input-area textarea::placeholder {
            color: #c9b0a4;
            font-size: 18px;
        }

        .input-area .btn-send {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #e8c8b8 0%, #dbb4a2 100%);
            color: #5a3a2e;
            font-size: 28px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(180, 130, 110, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-area .btn-send:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 24px rgba(180, 130, 110, 0.3);
        }

        .input-area .btn-send:active {
            transform: scale(0.94);
        }

        .input-area .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 打字状态 ===== */
        .typing {
            align-self: flex-start;
            padding: 12px 18px;
            background: #ffffff;
            border-radius: 18px;
            border-bottom-left-radius: 6px;
            font-size: 18px;
            color: #b07a6a;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 12px rgba(160, 120, 100, 0.08);
        }

        .typing .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #dbb4a2;
            border-radius: 50%;
            animation: wave 1.2s infinite;
        }
        .typing .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .container {
                max-height: 100vh;
                height: 100vh;
                border-radius: 20px;
            }
            .header h1 { font-size: 22px; }
            .message { font-size: 18px; padding: 12px 16px; }
            .input-area textarea { font-size: 18px; padding: 12px 16px; }
            .input-area .btn-send { width: 48px; height: 48px; font-size: 24px; }
        }

        /* ===== 空状态提示 ===== */
        .welcome-tip {
            text-align: center;
            color: #c9b0a4;
            font-size: 18px;
            padding: 40px 20px;
            line-height: 2;
        }
        .welcome-tip .heart {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 顶部 -->
    <div class="header">
        <h1>💕 妈妈的贴心小棉袄</h1>
        <div class="sub">—— 永远爱你，永远在 ——</div>
        <div class="date">{{ today }}</div>
    </div>

    <!-- 聊天区 -->
    <div class="chat-area" id="chatArea">
        <div class="welcome-tip" id="welcomeTip">
            <span class="heart">🌺</span>
            妈妈，你来啦！<br />
            有什么想跟我聊的吗？<br />
            <span style="font-size: 16px; color: #dbb4a2;">我每天都在这里陪着你 ❤️</span>
        </div>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
        <textarea id="msgInput" rows="1" placeholder="想跟孩子说点什么…" maxlength="500"></textarea>
        <button class="btn-send" id="sendBtn" title="发送">➤</button>
    </div>
</div>

<script>
    const chatArea = document.getElementById('chatArea');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const welcomeTip = document.getElementById('welcomeTip');

    let isWaiting = false;

    // 自动调整输入框高度
    msgInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // 发送消息
    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || isWaiting) return;

        // 隐藏欢迎语
        if (welcomeTip) welcomeTip.style.display = 'none';

        // 显示用户消息
        appendMessage(text, 'user');
        msgInput.value = '';
        msgInput.style.height = 'auto';
        msgInput.focus();

        // 显示打字状态
        const typingId = showTyping();

        isWaiting = true;
        sendBtn.disabled = true;

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();

            // 移除打字状态
            removeTyping(typingId);

            if (data.response) {
                appendMessage(data.response, 'bot', data.is_praise || false);
            } else {
                appendMessage('😊 妈妈，信号不太好，再说一遍好吗？', 'bot');
            }
        } catch (err) {
            removeTyping(typingId);
            appendMessage('🌹 妈妈别急，我在这儿呢。再试一次好不好？', 'bot');
        }

        isWaiting = false;
        sendBtn.disabled = false;
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // 追加消息
    function appendMessage(text, type, isPraise = false) {
        const div = document.createElement('div');
        div.className = `message ${type}`;

        if (type === 'bot' && isPraise) {
            const tag = document.createElement('div');
            tag.className = 'praise-tag';
            tag.textContent = '每日夸夸';
            div.appendChild(tag);
            // 将文本中的换行转为<br>
            const p = document.createElement('div');
            p.innerHTML = text.replace(/\n/g, '<br>');
            div.appendChild(p);
        } else {
            div.innerHTML = text.replace(/\n/g, '<br>');
        }

        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // 显示打字状态
    function showTyping() {
        const div = document.createElement('div');
        div.className = 'typing';
        div.id = 'typing-' + Date.now();
        div.innerHTML = '孩子正在听 <span class="dot"></span><span class="dot"></span><span class="dot"></span>';
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return div.id;
    }

    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    // 事件绑定
    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // 页面加载时聚焦输入框
    window.addEventListener('load', () => {
        msgInput.focus();
        // 滚动到最底部
        chatArea.scrollTop = chatArea.scrollHeight;
    });

    // 点击空白区域聚焦输入框
    chatArea.addEventListener('click', () => {
        msgInput.focus();
    });
</script>

</body>
</html>
