<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>🌺 妈妈的小棉袄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: #f5efe8;
            background-image: radial-gradient(circle at 20% 30%, #f0e4d8 0%, #f5efe8 80%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .container {
            width: 100%;
            max-width: 520px;
            height: 94vh;
            max-height: 820px;
            background: rgba(255, 250, 245, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(150, 120, 100, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(220, 190, 170, 0.3);
        }

        /* ===== 顶部 - 暖橙色调 ===== */
        .header {
            padding: 20px 22px 12px 22px;
            text-align: center;
            background: linear-gradient(145deg, #f5d6c6 0%, #fde8dd 100%);
            border-bottom: 1px solid #ecd5c7;
            flex-shrink: 0;
        }

        .header .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 2px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            color: #6a3f30;
            letter-spacing: 3px;
        }

        .header .sub {
            font-size: 15px;
            color: #9a6f5e;
            margin-top: 2px;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .header .date {
            font-size: 14px;
            color: #b58876;
            margin-top: 2px;
        }

        /* ===== 聊天区域 ===== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px 8px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #dcc4b8;
            border-radius: 4px;
        }

        /* ===== 消息气泡 - 加大字体适老 ===== */
        .message {
            max-width: 88%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 20px;
            line-height: 1.7;
            word-break: break-word;
            animation: fadeIn 0.4s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #e5d3c8;
            color: #4a3228;
            border-bottom-right-radius: 6px;
        }

        .message.bot {
            align-self: flex-start;
            background: #ffffff;
            color: #3d2c24;
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 12px rgba(160, 130, 110, 0.08);
        }

        .message.bot .greeting-tag {
            display: inline-block;
            background: #f5d6c6;
            color: #7a4a3a;
            font-size: 14px;
            padding: 2px 14px;
            border-radius: 20px;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .message.bot .greeting-tag::before {
            content: "🌺 ";
        }

        .message.bot .warning-tag {
            display: inline-block;
            background: #fce4d6;
            color: #b85a3a;
            font-size: 14px;
            padding: 2px 14px;
            border-radius: 20px;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .message.bot .warning-tag::before {
            content: "⚠️ ";
        }

        /* ===== 输入区域 ===== */
        .input-area {
            padding: 12px 18px 18px 18px;
            background: rgba(255, 248, 242, 0.6);
            border-top: 1px solid #ecddd4;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            border: none;
            border-radius: 24px;
            padding: 14px 20px;
            font-size: 20px;
            font-family: inherit;
            background: #ffffff;
            resize: none;
            outline: none;
            box-shadow: 0 2px 12px rgba(160, 130, 110, 0.06);
            transition: box-shadow 0.2s;
            min-height: 52px;
            max-height: 120px;
            line-height: 1.5;
            color: #3d2c24;
        }

        .input-area textarea:focus {
            box-shadow: 0 2px 20px rgba(180, 140, 120, 0.12);
        }

        .input-area textarea::placeholder {
            color: #c9b4a8;
            font-size: 18px;
        }

        .input-area .btn-send {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #f0d5c6 0%, #e0c0b0 100%);
            color: #5a3a2e;
            font-size: 28px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(180, 140, 120, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-area .btn-send:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 24px rgba(180, 140, 120, 0.2);
        }

        .input-area .btn-send:active {
            transform: scale(0.94);
        }

        .input-area .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 打字状态 ===== */
        .typing {
            align-self: flex-start;
            padding: 12px 18px;
            background: #ffffff;
            border-radius: 18px;
            border-bottom-left-radius: 6px;
            font-size: 18px;
            color: #b58876;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 12px rgba(160, 130, 110, 0.06);
        }

        .typing .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #dcc4b8;
            border-radius: 50%;
            animation: wave 1.2s infinite;
        }
        .typing .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .container {
                max-height: 100vh;
                height: 100vh;
                border-radius: 16px;
            }
            .header h1 { font-size: 22px; }
            .message { font-size: 19px; padding: 12px 16px; }
            .input-area textarea { font-size: 19px; padding: 12px 16px; }
            .input-area .btn-send { width: 48px; height: 48px; font-size: 24px; }
        }

        /* ===== 欢迎语 ===== */
        .welcome-tip {
            text-align: center;
            color: #c9b4a8;
            font-size: 18px;
            padding: 30px 20px;
            line-height: 2.2;
        }
        .welcome-tip .icon-big {
            font-size: 44px;
            display: block;
            margin-bottom: 10px;
        }
        .welcome-tip .highlight {
            color: #9a6f5e;
            font-weight: 500;
        }

        /* ===== 安全提示小标签 ===== */
        .safe-footer {
            text-align: center;
            font-size: 12px;
            color: #c9b4a8;
            padding: 4px 0 8px 0;
            letter-spacing: 1px;
            border-top: 1px solid #ecddd4;
            flex-shrink: 0;
            background: rgba(255, 248, 242, 0.4);
        }
        .safe-footer span {
            margin: 0 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 顶部 -->
    <div class="header">
        <span class="icon">🌺</span>
        <h1>妈妈的小棉袄</h1>
        <div class="sub">—— 您的生活小帮手 ——</div>
        <div class="date">{{ today }}</div>
    </div>

    <!-- 聊天区 -->
    <div class="chat-area" id="chatArea">
        <div class="welcome-tip" id="welcomeTip">
            <span class="icon-big">🌻</span>
            阿姨/叔叔，您好呀！<br />
            我是<span class="highlight">您的生活小帮手</span><br />
            陪您聊天、帮您解决问题、守护您的钱包<br />
            <span style="font-size: 16px; color: #dcc4b8;">有什么想跟我说的吗？ ❤️</span>
        </div>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
        <textarea id="msgInput" rows="1" placeholder="跟守护者说说话…" maxlength="500"></textarea>
        <button class="btn-send" id="sendBtn" title="发送">✉</button>
    </div>

    <!-- 底部安全提示 -->
    <div class="safe-footer">
        <span>🔒 不轻信</span> · <span>🛡 不透露</span> · <span>🚫 不转账</span>
    </div>
</div>

<script>
    const chatArea = document.getElementById('chatArea');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const welcomeTip = document.getElementById('welcomeTip');

    let isWaiting = false;

    msgInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || isWaiting) return;

        if (welcomeTip) welcomeTip.style.display = 'none';

        appendMessage(text, 'user');
        msgInput.value = '';
        msgInput.style.height = 'auto';
        msgInput.focus();

        const typingId = showTyping();
        isWaiting = true;
        sendBtn.disabled = true;

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();

            removeTyping(typingId);

            if (data.response) {
                appendMessage(data.response, 'bot', data.is_greeting || false);
            } else {
                appendMessage('阿姨/叔叔，我缓一缓，您再说一遍好吗？🌹', 'bot');
            }
        } catch (err) {
            removeTyping(typingId);
            appendMessage('网络有点忙，阿姨/叔叔稍等一小会儿好不好？🌹', 'bot');
        }

        isWaiting = false;
        sendBtn.disabled = false;
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function appendMessage(text, type, isGreeting = false) {
    const div = document.createElement('div');
    div.className = `message ${type}`;

    // 【关键】将 **文本** 转换为 <strong>文本</strong>（粗体）
    let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    formattedText = formattedText.replace(/\n/g, '<br>');

    if (type === 'bot' && isGreeting) {
        const tag = document.createElement('div');
        tag.className = 'greeting-tag';
        tag.textContent = '🌺 暖心问候';
        div.appendChild(tag);
        const p = document.createElement('div');
        p.innerHTML = formattedText;
        div.appendChild(p);
    } else if (type === 'bot' && text.includes('⚠️')) {
        const tag = document.createElement('div');
        tag.className = 'warning-tag';
        tag.textContent = '⚠️ 防骗提醒';
        div.appendChild(tag);
        const p = document.createElement('div');
        p.innerHTML = formattedText;
        div.appendChild(p);
    } else {
        const p = document.createElement('div');
        p.innerHTML = formattedText;
        div.appendChild(p);
    }

    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'typing';
        div.id = 'typing-' + Date.now();
        div.innerHTML = '小棉袄在思考 <span class="dot"></span><span class="dot"></span><span class="dot"></span>';
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return div.id;
    }

    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    window.addEventListener('load', () => {
    // 从后端获取每日问候并显示
    const dailyGreeting = "{{ daily_greeting }}";  // 由 Flask 传入
    if (dailyGreeting) {
        // 自动显示每日问候（不消耗用户消息）
        appendMessage('🌺 **早上好呀！**\n\n' + dailyGreeting + '\n\n---\n\n今天有什么想跟我聊的？', 'bot', true);
        // 隐藏欢迎语
        if (welcomeTip) welcomeTip.style.display = 'none';
    }
    msgInput.focus();
    chatArea.scrollTop = chatArea.scrollHeight;
});
</script>

</body>
</html>
